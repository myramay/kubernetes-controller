---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-tenancy-example-com-v1-tenantnamespace
  failurePolicy: Fail
  name: mtenantnamespace.kb.io
  rules:
  - apiGroups:
    - tenancy.example.com
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - tenantnamespaces
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-tenancy-example-com-v1-tenantnamespace
  failurePolicy: Fail
  name: vtenantnamespace.kb.io
  rules:
  - apiGroups:
    - tenancy.example.com
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - tenantnamespaces
  sideEffects: None
